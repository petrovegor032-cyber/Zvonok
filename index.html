<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📞 PeerJS звонок</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: system-ui; background: #0a2f1f; padding: 20px; text-align: center; color: white; }
        input, button { padding: 12px; margin: 8px; border-radius: 30px; border: none; }
        button { background: #5a3e1b; color: white; cursor: pointer; }
        .status { background: #1e2a1c; padding: 10px; border-radius: 30px; margin: 16px; }
    </style>
</head>
<body>
    <h1>📞 Тест звонка (PeerJS)</h1>
    <div class="status" id="status">Подключение...</div>
    <div><strong>Ваш ID:</strong> <span id="myId">загрузка...</span></div>
    <input type="text" id="targetId" placeholder="ID собеседника">
    <button id="callBtn">🔊 Позвонить</button>
    <button id="hangupBtn" disabled>❌ Завершить</button>

    <script>
        const statusDiv = document.getElementById('status');
        const myIdSpan = document.getElementById('myId');
        const targetInput = document.getElementById('targetId');
        const callBtn = document.getElementById('callBtn');
        const hangupBtn = document.getElementById('hangupBtn');
        
        let localStream = null;
        let peer = null;
        let currentCall = null;

        // Инициализация PeerJS (бесплатный сервер)
        const peerId = 'user_' + Math.random().toString(36).substr(2, 8);
        peer = new Peer(peerId, {
            host: '0.peerjs.com',
            port: 443,
            secure: true
        });

        peer.on('open', () => {
            myIdSpan.innerText = peerId;
            statusDiv.innerHTML = '🟢 Готов, можно звонить!';
        });

        peer.on('call', async (call) => {
            statusDiv.innerHTML = '📞 Входящий звонок...';
            // Запрашиваем микрофон
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            call.answer(localStream);
            currentCall = call;
            
            call.on('stream', (remoteStream) => {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                statusDiv.innerHTML = '🎧 Разговор идёт...';
                hangupBtn.disabled = false;
            });
            
            call.on('close', () => {
                statusDiv.innerHTML = '🔴 Звонок завершён';
                hangupBtn.disabled = true;
            });
        });

        peer.on('error', (err) => {
            statusDiv.innerHTML = '❌ Ошибка: ' + err.type;
            console.error(err);
        });

        // Исходящий звонок
        callBtn.onclick = async () => {
            const target = targetInput.value.trim();
            if (!target) {
                statusDiv.innerHTML = '⚠️ Введите ID собеседника';
                return;
            }
            
            statusDiv.innerHTML = '📞 Звоню...';
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            const call = peer.call(target, localStream);
            currentCall = call;
            
            call.on('stream', (remoteStream) => {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                statusDiv.innerHTML = '🎧 Разговор идёт...';
                hangupBtn.disabled = false;
            });
            
            call.on('close', () => {
                statusDiv.innerHTML = '🔴 Звонок завершён';
                hangupBtn.disabled = true;
            });
        };

        hangupBtn.onclick = () => {
            if (currentCall) currentCall.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            hangupBtn.disabled = true;
        };
    </script>
</body>
</html>
