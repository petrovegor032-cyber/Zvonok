<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📞 WebRTC звонок без сервера</title>
    <style>
        body { font-family: system-ui; background: #0a2f1f; padding: 20px; }
        .card { background: #1e2a1c; border-radius: 32px; padding: 24px; max-width: 500px; margin: 0 auto; color: #ffefb9; }
        button { background: #5a3e1b; border: none; color: white; padding: 12px 20px; border-radius: 60px; width: 100%; margin: 8px 0; cursor: pointer; }
        input { width: 100%; padding: 12px; border-radius: 60px; background: #2c2b1f; color: white; margin: 8px 0; }
        .status { background: #00000066; padding: 10px; border-radius: 40px; text-align: center; margin: 16px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/webconnect@0.0.9/dist/umd/webconnect.js"></script>
</head>
<body>
<div class="card">
    <h1>📞 Тест звонка</h1>
    <div class="status" id="status">⏳ Подключение к сети...</div>
    <div><strong>🔑 Ваш ID:</strong> <span id="myId">...</span></div>
    <input type="text" id="targetId" placeholder="Введите ID собеседника">
    <button id="callBtn">🔊 ПОЗВОНИТЬ</button>
    <button id="hangupBtn" disabled>❌ Завершить</button>
</div>
<script>
    let localStream = null;
    let peerConnection = null;
    let remoteId = null;

    const statusDiv = document.getElementById('status');
    const myIdSpan = document.getElementById('myId');
    const callBtn = document.getElementById('callBtn');
    const hangupBtn = document.getElementById('hangupBtn');
    const targetInput = document.getElementById('targetId');

    // Инициализация webconnect (без сервера!)
    const connect = webconnect({ appName: "ZvonokTest", channelName: "public" });

    connect.onConnect(async (attr) => {
        statusDiv.innerHTML = '🟢 Соединение установлено!';
        myIdSpan.innerText = attr.connectId;
        
        // Запрашиваем микрофон
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    });

    connect.onReceive(async (data, attr) => {
        if (data.type === 'offer') {
            // Входящий звонок
            statusDiv.innerHTML = '📞 Входящий звонок...';
            remoteId = attr.connectId;
            await acceptCall(JSON.parse(data.sdp));
        } else if (data.type === 'answer') {
            await peerConnection.setRemoteDescription(JSON.parse(data.sdp));
        } else if (data.type === 'candidate') {
            await peerConnection.addIceCandidate(JSON.parse(data.candidate));
        }
    });

    async function makeCall() {
        const target = targetInput.value.trim();
        if (!target) { statusDiv.innerHTML = '⚠️ Введите ID'; return; }
        
        remoteId = target;
        statusDiv.innerHTML = '📞 Звонок...';
        
        peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        
        peerConnection.onicecandidate = (e) => {
            if (e.candidate) {
                connect.Send(JSON.stringify({ type: 'candidate', candidate: e.candidate.toJSON() }), { connectId: remoteId });
            }
        };
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        connect.Send(JSON.stringify({ type: 'offer', sdp: JSON.stringify(offer) }), { connectId: remoteId });
        
        hangupBtn.disabled = false;
    }

    async function acceptCall(offerSdp) {
        peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        
        peerConnection.onicecandidate = (e) => {
            if (e.candidate) {
                connect.Send(JSON.stringify({ type: 'candidate', candidate: e.candidate.toJSON() }), { connectId: remoteId });
            }
        };
        
        await peerConnection.setRemoteDescription(offerSdp);
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        connect.Send(JSON.stringify({ type: 'answer', sdp: JSON.stringify(answer) }), { connectId: remoteId });
        
        statusDiv.innerHTML = '🎧 Разговор...';
        hangupBtn.disabled = false;
    }

    function hangUp() {
        if (peerConnection) peerConnection.close();
        peerConnection = null;
        statusDiv.innerHTML = '🔴 Звонок завершён';
        hangupBtn.disabled = true;
    }

    callBtn.onclick = makeCall;
    hangupBtn.onclick = hangUp;
</script>
</body>
</html>
